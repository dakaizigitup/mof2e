trainer: ocp_lora

dataset:
  train:
    format: lmdb
    src: /home/dell/autodl-tmp/lorafair/data/is2r/filtered_train2
    key_mapping:
      y_relaxed: energy

    transforms:
      normalizer:
        energy:
          mean: -0.5249277949333191
          stdev: 0.943034291267395
        
  val:
    src: /home/dell/autodl-tmp/lorafair/data/is2r/bestTrain2

logger: wandb

outputs:
  energy:
    shape: 1
    level: system
  

loss_functions:
  - energy:
      fn: mae
      coefficient: 4

evaluation_metrics:
  metrics:
    energy:
      - mae
      - mse
      - energy_within_threshold
    
  primary_metric: energy_mae

