includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/DimeNet++/base.yml

# DimeNet++ Stage2：nm + atom + global FiLM 注入
# 从 Stage1 best checkpoint 加载，冻结前半部分，训练全局 FiLM + 后半 interaction blocks
#
# 设计原则（对齐 eSCN）：
#   - num_blocks=4，freeze=2，inject=2 → 50% 冻结（类比 eSCN 6/12）
#   - interaction_blocks[2:3] 可训练，能适配全局 FiLM 信号
#   - weight_decay=0.2 对齐 eSCN，防止小样本过拟合
#
# 运行命令：
#   python main.py --config mof2e/DimeNet++/DimeNet_stage2.yml --mode train \
#     --checkpoint /path/to/stage1/best_checkpoint.pt

trainer: ocp

task:
  ddp_find_unused_parameters: true
  ignore_checkpoint: false
  strict_load: false       # Stage1 checkpoint 无 global FiLM keys

model:
  name: dimenetplusplus_global_weighted_energy_head
  reduce: weighted_sum
  weight_nn_hidden_dim: 64
  use_initial_embeddings: false

  backbone:
    name: dimenetplusplus_global

    # --- nm / condition ---
    base_nm_dim: 2
    condition_hidden_dim: 64
    nm_max_count: 15.0

    # --- atom features: ON ---
    use_atom_extra_features: true
    atom_extra_dim: 128
    atom_encoder_type: v2

    # --- global features: ON ---
    use_mof_global_features: true
    mof_global_excel_path: /home/dell/autodl-tmp/lorafair/data/MOF_embedding_all.xlsx
    mof_global_dim: 64
    mof_global_encoder_type: v2

    mof_smi_ted_folder: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/smi_ted/smi_ted_light
    mof_selfies_ted_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/selfies_ted/pretrained
    mof_mhg_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/mhg_model/pickles/pytorch_model.bin
    mof_smiles_cache_path: /home/dell/autodl-tmp/lorafair/data/mof_smiles_cache_v2.pt

    # --- FiLM adapter ---
    adapter_hidden_dim: 128
    adapter_dropout: 0.0
    adapter_zero_init: true

    # 注入在冻结/可训练边界（50% split，对齐 eSCN 原则）
    global_inject_layer: 2

    # 冻结前 2 块（4 blocks 的 50%）
    freeze_first_n_layers: 2

    # --- DimeNet++ params ---
    hidden_channels: 128
    num_blocks: 4
    int_emb_size: 64
    basis_emb_size: 8
    out_emb_channels: 256
    num_spherical: 7
    num_radial: 6
    cutoff: 10.0
    envelope_exponent: 5
    num_before_skip: 1
    num_after_skip: 2
    num_output_layers: 3
    max_num_elements: 100
    use_pbc: true
    otf_graph: true
    regress_forces: false

optim:
  batch_size: 4
  eval_batch_size: 4
  num_workers: 8

  lr_initial: 0.0001

  optimizer: AdamW
  optimizer_params:
    amsgrad: true
    weight_decay: 0.2

  eval_every: 1000
  lr_gamma: 0.3
  lr_milestones:
    - 9300    # epoch ~10
    - 18600   # epoch ~20
    - 27900   # epoch ~30

  warmup_steps: 100
  warmup_factor: 0.2

  max_epochs: 50
  clip_grad_norm: 5.0

  ema_decay: 0.999
