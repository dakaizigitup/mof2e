includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/SchNet/base.yml

# Stage 1: SchNet baseline (atom + nm features only, no MOF global encoder)
# Run: python main.py --config mof2e/SchNet/SchNet_stage1.yml --mode train
# This generates the Stage-1 checkpoint used as starting point for Stage 2.

trainer: ocp

task:
  ddp_find_unused_parameters: true
  ignore_checkpoint: false
  strict_load: false

model:
  name: schnet_global_weighted_energy_head
  reduce: weighted_sum
  weight_nn_hidden_dim: 64
  use_initial_embeddings: false

  condition_dim: 2
  condition_hidden_dim: 64

  backbone:
    name: schnet_global

    # --- nm / condition ---
    base_nm_dim: 2
    condition_hidden_dim: 64
    nm_max_count: 15.0

    # --- atom features ---
    use_atom_extra_features: true
    atom_extra_dim: 128
    atom_encoder_type: v2

    # --- global features: OFF for Stage 1 ---
    use_mof_global_features: false

    # --- FiLM adapter ---
    adapter_hidden_dim: 128
    adapter_dropout: 0.0
    adapter_zero_init: true
    global_inject_layer: 3

    # Stage 1: no freeze
    freeze_first_n_layers: 0

    # --- SchNet params ---
    hidden_channels: 128
    num_filters: 128
    num_interactions: 6
    num_gaussians: 50
    cutoff: 8.0
    readout: sum
    max_num_elements: 100
    use_pbc: true
    otf_graph: true
    regress_forces: false

optim:
  batch_size: 8
  eval_batch_size: 8
  num_workers: 8

  lr_initial: 0.0004

  optimizer: AdamW
  optimizer_params:
    amsgrad: true
    weight_decay: 0.01

  eval_every: 1000
  lr_gamma: 0.3
  # 3714样本 / batch8 = 465步/epoch
  # 模型在 epoch ~8-9 达到最优，提前降 LR 避免过拟合
  lr_milestones:
    - 4650    # epoch ~10
    - 9300    # epoch ~20
    - 13950   # epoch ~30

  warmup_steps: 100
  warmup_factor: 0.2

  max_epochs: 50
  clip_grad_norm: 5.0

  ema_decay: 0.999
