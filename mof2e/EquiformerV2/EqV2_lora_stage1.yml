includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/EquiformerV2/base.yml

# EquiformerV2-LoRA Stage 1：nm + atom(V2)，无 global
# 在 OC20-IS2RE 预训练 backbone 上做 LoRA 微调，加入 nm + 原子物理特征
#
# 运行命令：
#   python fairchem/main.py --config fairchem/mof2e/EquiformerV2/EqV2_lora_stage1.yml --mode train

trainer: ocp_lora

task:
  ddp_find_unused_parameters: true

model:
  name: equiformer_v2_lora
  regress_forces: false

  # --- 图构建 ---
  use_pbc: true
  otf_graph: true
  max_neighbors: 20
  max_radius: 8.0
  max_num_elements: 100

  # --- EqV2 主干（与预训练 ckpt 一致） ---
  num_layers: 8
  sphere_channels: 128
  attn_hidden_channels: 64
  num_heads: 8
  attn_alpha_channels: 64
  attn_value_channels: 16
  ffn_hidden_channels: 128
  norm_type: 'layer_norm_sh'

  lmax_list: [4]
  mmax_list: [2]
  grid_resolution: 18
  num_sphere_samples: 128

  edge_channels: 128
  use_atom_edge_embedding: true
  distance_function: 'gaussian'
  num_distance_basis: 600

  attn_activation: 'silu'
  use_s2_act_attn: false
  ffn_activation: 'silu'
  use_gate_act: false
  use_grid_mlp: true

  alpha_drop: 0.05
  drop_path_rate: 0.05
  proj_drop: 0.05
  weight_init: 'uniform'

  avg_num_nodes: 192.561
  avg_degree: 21.024127419363214

  pretrained_model_path: /home/dell/autodl-tmp/lorafair/fairchem/lora_model/ckpt_is2re/Equiformer_V2_Direct.pt

  # --- LoRA ---
  use_lora: true
  lora_rank: 16
  lora_alpha: 64.0
  lora_dropout: 0.0
  use_enhanced_lora: false

  train_scalar_path: false
  train_energy_head: true

  # --- nm condition ---
  use_nm_features: true
  base_nm_dim: 2
  condition_hidden_dim: 64
  nm_max_count: 15.0

  # --- atom 特征：ON（V2） ---
  use_atom_extra_features: true
  atom_feat_out_dim: 128
  atom_encoder_type: v2

  # --- global 特征：OFF（Stage 1） ---
  use_mof_global_features: false

  feature_fusion: 'film'
  adapter_hidden_dim: 128
  adapter_dropout: 0.0
  adapter_zero_init: true
  apply_context_layernorm: true

optim:
  batch_size: 1
  eval_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4

  max_epochs: 30
  clip_grad_norm: 1.0
  ema_decay: 0.999
  eval_every: 1000

  optimizer: AdamW
  lr_initial: 1.0e-5
  optimizer_params:
    weight_decay: 0.05
    betas: [0.9, 0.999]

  scheduler: "LambdaLR"
  scheduler_params:
    lambda_type: cosine
    warmup_factor: 0.2
    warmup_epochs: 5
    lr_min_factor: 0.01

  # 各参数组独立 LR
  lora:
    lr_initial: 3.0e-6
    optimizer_params:
      weight_decay: 0.05

  atom_encoder:
    lr_initial: 5.0e-5

  film_adapter:              # FiLM + context_ln + condition_encoder
    lr_initial: 5.0e-5

  scalar_path_modules:       # energy_block
    lr_initial: 1.0e-5
    optimizer_params:
      weight_decay: 0.05
