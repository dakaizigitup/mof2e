includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/EquiformerV2/base.yml

# EquiformerV2-LoRA Stage 2（正则版）
# 基于当前最优配置 EqV2_lora_stage2.yml（best val/energy_mae=0.24689 @ epoch≈0.94）
# 针对 stage2 早期过拟合做 4 处正则化改动：
#   1. adapter_dropout                0.0  → 0.1
#   2. max_epochs                     27   → 5
#   3. optim.mof_encoder.lr_initial   8e-5 → 1e-5
#   4. optim.mof_encoder.weight_decay 0.05 → 0.1
# 其他所有设置与 EqV2_lora_stage2.yml 完全一致（不开 global_layer_norm）。
#
# 动机：原版最优 MAE 出现在 epoch 0.94 之后就开始上升，说明 global 分支
#       (mof_encoder, 1.2M trainable params) 在 ~700 unique MOF 上过拟合得太快。
#       先从收敛控制这条最便宜的路试起：更慢更稳地学 global + dropout + 早停。
#
# 运行命令：
#   python fairchem/main.py \
#     --config fairchem/mof2e/EquiformerV2/EqV2_lora_stage2_reg.yml \
#     --mode train \
#     --checkpoint /path/to/stage1/best_checkpoint.pt

trainer: ocp_lora

task:
  ddp_find_unused_parameters: true
  strict_load: false   # stage1 checkpoint 无 mof_global_encoder keys
  restart_stage2: true

model:
  name: equiformer_v2_lora
  regress_forces: false

  # --- 图构建 ---
  use_pbc: true
  otf_graph: true
  max_neighbors: 20
  max_radius: 8.0
  max_num_elements: 100

  # --- EqV2 主干（与预训练 ckpt + stage1 一致） ---
  num_layers: 8
  sphere_channels: 128
  attn_hidden_channels: 64
  num_heads: 8
  attn_alpha_channels: 64
  attn_value_channels: 16
  ffn_hidden_channels: 128
  norm_type: 'layer_norm_sh'

  lmax_list: [4]
  mmax_list: [2]
  grid_resolution: 18
  num_sphere_samples: 128

  edge_channels: 128
  use_atom_edge_embedding: true
  distance_function: 'gaussian'
  num_distance_basis: 600

  attn_activation: 'silu'
  use_s2_act_attn: false
  ffn_activation: 'silu'
  use_gate_act: false
  use_grid_mlp: true

  alpha_drop: 0.05
  drop_path_rate: 0.05
  proj_drop: 0.05
  weight_init: 'uniform'

  avg_num_nodes: 192.561
  avg_degree: 21.024127419363214

  pretrained_model_path: /home/dell/autodl-tmp/lorafair/fairchem/lora_model/ckpt_is2re/Equiformer_V2_Direct.pt

  # --- LoRA（与 stage1 保持一致） ---
  use_lora: true
  lora_rank: 16
  lora_alpha: 64.0
  lora_dropout: 0.0
  use_enhanced_lora: false

  freeze_first_n_lora_blocks: 4

  train_scalar_path: false
  train_energy_head: true

  # --- nm condition ---
  use_nm_features: true
  base_nm_dim: 2
  condition_hidden_dim: 64
  nm_max_count: 15.0

  # --- atom 特征：ON（V2） ---
  use_atom_extra_features: true
  atom_feat_out_dim: 128
  atom_encoder_type: v2

  # --- global 特征：ON（V2，三模态） ---
  use_mof_global_features: true
  mof_global_encoder_type: v2
  mof_global_dim: 64
  global_inject_layer: 4
  mof_global_excel_path: /home/dell/autodl-tmp/lorafair/data/MOF_embedding_all.xlsx
  mof_smi_ted_folder: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/smi_ted/smi_ted_light
  mof_selfies_ted_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/selfies_ted/pretrained
  mof_mhg_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/mhg_model/pickles/pytorch_model.bin
  mof_smiles_cache_path: /home/dell/autodl-tmp/lorafair/data/mof_smiles_cache_v2.pt
  mof_global_pretrained_device: cpu

  feature_fusion: 'film'
  adapter_hidden_dim: 128
  adapter_dropout: 0.1            # 🔺 正则化：0.0 → 0.1
  adapter_zero_init: true
  apply_context_layernorm: true

optim:
  batch_size: 1
  eval_batch_size: 1
  grad_accumulation_steps: 8
  num_workers: 4

  # 🔺 早停：27 → 5（best @ epoch≈1，多余 epoch 只会污染 EMA）
  max_epochs: 5
  clip_grad_norm: 1.0
  ema_decay: 0.999
  eval_every: 500

  optimizer: AdamW
  lr_initial: 2.0e-6
  optimizer_params:
    weight_decay: 0.05
    betas: [0.9, 0.999]

  scheduler: "LambdaLR"
  scheduler_params:
    lambda_type: cosine
    warmup_factor: 0.2
    warmup_epochs: 3
    lr_min_factor: 0.01

  lora:
    lr_initial: 5.0e-7
    optimizer_params:
      weight_decay: 0.05

  atom_encoder:
    lr_initial: 5.0e-6

  # 🔺 global 分支：学习率大幅缩小 + 权重衰减加倍
  mof_encoder:
    lr_initial: 1.0e-5            # 8.0e-5 → 1.0e-5
    optimizer_params:
      weight_decay: 0.1           # 0.05  → 0.1

  film_adapter:
    lr_initial: 8.0e-5

  scalar_path_modules:
    lr_initial: 2.0e-6
    optimizer_params:
      weight_decay: 0.05
