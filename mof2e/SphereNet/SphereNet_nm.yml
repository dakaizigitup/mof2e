includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/SchNet/base.yml

# SphereNet nm-only baseline (condition only, no atom extra features, no MOF global)
# Run: python main.py --config fairchem/mof2e/SphereNet/SphereNet_nm.yml --mode train

trainer: ocp

task:
  ddp_find_unused_parameters: true
  ignore_checkpoint: false
  strict_load: false

model:
  name: spherenet_global_weighted_energy_head
  reduce: weighted_sum
  weight_nn_hidden_dim: 64

  backbone:
    name: spherenet_global

    # --- nm / condition ---
    base_nm_dim: 2
    condition_hidden_dim: 64
    nm_max_count: 15.0

    # --- atom features: OFF ---
    use_atom_extra_features: false
    atom_extra_dim: 128
    atom_encoder_type: v2

    # --- global features: OFF ---
    use_mof_global_features: false

    # --- FiLM adapter ---
    adapter_hidden_dim: 128
    adapter_dropout: 0.0
    adapter_zero_init: true
    global_inject_layer: 2
    global_layer_norm: false

    # no freeze
    freeze_first_n_layers: 0

    # --- SphereNet params ---
    hidden_channels: 128
    out_emb_channels: 256
    out_channels: 1
    int_emb_size: 64
    basis_emb_size_dist: 8
    basis_emb_size_angle: 8
    basis_emb_size_torsion: 8
    num_spherical: 7
    num_radial: 6
    envelope_exponent: 5
    num_layers: 4
    num_before_skip: 1
    num_after_skip: 2
    num_output_layers: 3
    cutoff: 8.0
    use_pbc: true
    otf_graph: true
    regress_forces: false
    max_neighbors: 25

optim:
  batch_size: 8
  eval_batch_size: 8
  num_workers: 8

  lr_initial: 0.0004

  optimizer: AdamW
  optimizer_params:
    amsgrad: true
    weight_decay: 0.01

  eval_every: 1000
  lr_gamma: 0.3
  lr_milestones:
    - 4650
    - 9300
    - 13950

  warmup_steps: 100
  warmup_factor: 0.2

  max_epochs: 50
  clip_grad_norm: 5.0

  ema_decay: 0.999
