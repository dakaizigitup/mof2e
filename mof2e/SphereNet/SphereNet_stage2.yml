includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/SchNet/base.yml

# Stage 2: SphereNet + MOF global FiLM injection
# Run: python main.py --config fairchem/mof2e/SphereNet/SphereNet_stage2.yml --mode train \
#   --checkpoint /path/to/stage1/best_checkpoint.pt

trainer: ocp

task:
  ddp_find_unused_parameters: true
  ignore_checkpoint: false
  strict_load: false

model:
  name: spherenet_global_weighted_energy_head
  reduce: weighted_sum
  weight_nn_hidden_dim: 64

  backbone:
    name: spherenet_global

    # --- nm / condition ---
    base_nm_dim: 2
    condition_hidden_dim: 64
    nm_max_count: 15.0

    # --- atom features ---
    use_atom_extra_features: true
    atom_extra_dim: 128
    atom_encoder_type: v2

    # --- global features: ON for Stage 2 ---
    use_mof_global_features: true
    mof_global_excel_path: /home/dell/autodl-tmp/lorafair/data/MOF_embedding_all.xlsx
    mof_global_dim: 64
    mof_global_encoder_type: v2

    mof_smi_ted_folder: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/smi_ted/smi_ted_light
    mof_selfies_ted_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/selfies_ted/pretrained
    mof_mhg_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/mhg_model/pickles/pytorch_model.bin
    mof_smiles_cache_path: /home/dell/autodl-tmp/lorafair/data/mof_smiles_cache_v2.pt

    # --- FiLM adapter ---
    adapter_hidden_dim: 128
    adapter_dropout: 0.0
    adapter_zero_init: true
    global_inject_layer: 4
    global_layer_norm: true

    # Stage 2: freeze early blocks, train global branch + late blocks + head
    freeze_first_n_layers: 2

    # --- SphereNet params ---
    hidden_channels: 128
    out_emb_channels: 256
    out_channels: 1
    int_emb_size: 64
    basis_emb_size_dist: 8
    basis_emb_size_angle: 8
    basis_emb_size_torsion: 8
    num_spherical: 7
    num_radial: 6
    envelope_exponent: 5
    num_layers: 4
    num_before_skip: 1
    num_after_skip: 2
    num_output_layers: 3
    cutoff: 8.0
    use_pbc: true
    otf_graph: true
    regress_forces: false
    max_neighbors: 25

optim:
  batch_size: 8
  eval_batch_size: 8
  num_workers: 8

  lr_initial: 0.00005
  backbone_lr_ratio: 0.5

  optimizer: AdamW
  optimizer_params:
    amsgrad: true
    weight_decay: 0.01

  eval_every: 500
  lr_gamma: 0.3
  lr_milestones:
    - 3480
    - 6960

  warmup_steps: 300
  warmup_factor: 0.05

  max_epochs: 15
  clip_grad_norm: 1.0

  ema_decay: 0.999
