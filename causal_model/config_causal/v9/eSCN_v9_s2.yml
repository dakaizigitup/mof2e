# V9 Stage 2 — tri-branch invariance stage
#
# Stage 2 objective:
#   L = L_energy + λ_inv L_IRM + λ_dec L_decorrel + λ_sub L_subgraph_consistency
# Optional ablation/debug:
#   + λ_env CE(env_logits, env_id), default off because it can conflict with invariance.

includes:
  - /home/dell/autodl-tmp/lorafair/fairchem/mof2e/eSCN/base.yml

trainer: ocp_causal_v9

task:
  ddp_find_unused_parameters: true
  ignore_checkpoint: false
  strict_load: false

model:
  name: escn_v9_causal_s2
  reduce: weighted_sum
  weight_nn_hidden_dim: 64
  use_initial_embeddings: true
  condition_dim: 2
  condition_hidden_dim: 64

  atom_type_n_classes: 100
  branch_dim: 128
  freeze_first_n_layers: 6
  path_dropout_prob: 0.15

  backbone:
    name: escn
    feature_fusion: concat
    activation_checkpoint: true

    use_atom_extra_features: true
    atom_extra_dim: 128
    atom_encoder_type: v2

    use_mof_global_features: true
    mof_global_excel_path: /home/dell/autodl-tmp/lorafair/data/MOF_embedding_all.xlsx
    mof_global_dim: 64
    mof_global_encoder_type: v2
    mof_smi_ted_folder: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/smi_ted/smi_ted_light
    mof_selfies_ted_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/selfies_ted/pretrained
    mof_mhg_path: /home/dell/anaconda3/envs/fairchem/lib/python3.10/site-packages/fairchem/materials-main/models/mhg_model/pickles/pytorch_model.bin
    mof_smiles_cache_path: /home/dell/autodl-tmp/lorafair/data/mof_smiles_cache_v2.pt

    base_nm_dim: 2

    adapter_hidden_dim: 128
    adapter_dropout: 0.0
    adapter_zero_init: true
    global_inject_layer: 6
    global_inject_mode: film

    num_layers: 12
    max_neighbors: 20
    cutoff: 8.0
    sphere_channels: 96
    hidden_channels: 192
    lmax_list: [6]
    mmax_list: [2]
    num_sphere_samples: 64
    distance_function: "gaussian"
    regress_forces: false
    use_pbc: true
    basis_width_scalar: 2.0
    otf_graph: true
    max_num_elements: 100

causal:
  version: v9
  stage: 2

  lambda_inv: 0.5
  lambda_dec: 0.1
  lambda_sub: 0.1

  # Auxiliary env-infer CE. Keep 0.0 for the main V9 run; set e.g. 0.05 only
  # for ablation/debugging whether tri-branch features encode gas environment.
  lambda_env: 0.0

  # Update after Stage 1 finishes
  init_from: /home/dell/autodl-tmp/lorafair/checkpoints/STAGE1_V9_TIMESTAMP/best_checkpoint.pt

optim:
  # R-1: IRM penalty needs ≥2 envs per batch; bs=1 makes it degenerate.
  # bs=8 statistically yields all 3 envs in most batches given the (h,c) grid
  # used for explode_y_relaxed.
  batch_size: 8
  eval_batch_size: 8
  num_workers: 8
  lr_initial: 0.0003
  optimizer: AdamW
  optimizer_params:
    amsgrad: true
    weight_decay: 0.02
  eval_every: 1000
  lr_gamma: 0.3
  lr_milestones:
    - 18000
    - 28000
    - 36000
  warmup_steps: 100
  warmup_factor: 0.2
  max_epochs: 35
  clip_grad_norm: 5.0
  ema_decay: 0.999
